server:
  port: 8080

spring:
  application:
    name: pedido-service

  datasource:
    url: jdbc:postgresql://localhost:5432/pedidos_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

        # 🔥 BATCH REAL (CLAVE)
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true

        # 🔥 OPTIMIZACIONES EXTRA
        generate_statistics: false
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://dummy

app:
  batch:
    size: 500

logging:
  pattern:
    console: >
      {"timestamp":"%d{ISO8601}",
      "level":"%p",
      "correlationId":"%X{correlationId}",
      "thread":"%thread",
      "logger":"%logger{36}",
      "message":"%m"}%n
  level:
    root: INFO
    com.rest.api: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html