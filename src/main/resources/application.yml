server:
  port: 8080

spring:
  application:
    name: pedido-service

  datasource:
    url: jdbc:postgresql://localhost:5432/pedidos_db
    username: postgres
    password: 1234

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 500

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://dummy

app:
  batch:
    size: 500

logging:
  pattern:
    console: "{\"timestamp\":\"%d{ISO8601}\",\"level\":\"%p\",\"correlationId\":\"%X{correlationId}\",\"thread\":\"%thread\",\"logger\":\"%logger{36}\",\"message\":\"%m\"}%n"
  level:
    com.rest.api: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html